spring.application.name=point

# --- H2 (in-memory) ---
spring.datasource.url=jdbc:h2:mem:point;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Point policy
point.max-per-earn=100000
point.max-balance=5000000
point.default-expiry-days=365
point.min-expiry-days=1
point.max-expiry-years=5
